<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>google-translate-complex-paragraph fixture (v1.4.2 / v1.4.3)</title>
</head>
<body>
  <!--
    Fixture: Wikipedia lede 樣式段落
    結構特徵：同一段落內混合多種行內元素：
      <b>（語意標籤，需配對標記）
      <i>（語意標籤，需配對標記）
      <a href>（連結，需配對標記）
      <small>（語意標籤，需配對標記）
      <span class="...">（純樣式包裝，不應加標記——v1.4.3 設計）
    對應 v1.4.2 修正：複雜段落 10+ 個標記 → 改用 GT_INLINE_TAGS 白名單只挑語意標籤
    對應 v1.4.3 修正：白名單從「只留 a」放寬到「i/b/small 等也留」，單獨排除 span
  -->
  <p id="target">
    <b>Article Name</b> is the <i>main subject</i> of this passage.
    See the <a href="https://example.com/main">main article</a> and
    <a href="https://example.com/related">related article</a>.
    <span class="noise">This text lives inside a span</span>.
    <small>(small print note here)</small>
  </p>
</body>
</html>
