<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Media-card attachment fixture</title></head>
<body>
<!-- v1.4.20 regression fixture：媒體卡片（XenForo 附件 LI 等）不該整段收進來翻

  典型結構（XenForo 附件清單）：
    <li>
      <a class="file-preview"><img src="..."></a>      ← 預覽圖
      <div class="file-content">                       ← 檔名 + 資訊
        <a class="file-name">...</a>
        <div class="file-meta">...</div>
      </div>
    </li>

  Bug：LI 是 BLOCK_TAGS_SET 成員，且沒有 H1-H6/P/LI 等 block 子孫
  → containsBlockDescendant = false → walker 把整個 LI 當 element unit
  → injectTranslation → injectIntoTarget 判定：
       containsMedia(LI) = true（img 在後代），hasContainerChild = true（DIV.file-content）
     → 條件 `containsMedia && !hasContainerChild` 不成立 → **走 clean-slate**
     → 清空 LI 所有子元素（含預覽圖），圖片直接消失。

  修法（v1.4.20，content-detect.js acceptNode BLOCK_TAGS 分支）：
    媒體 + CONTAINER 子容器同時出現 → FILTER_SKIP，不把 block 本身當 element unit，
    讓 walker 往 LI 內部找真正的葉節點（如 file-meta DIV）去翻。
    stats.mediaCardSkip 作 forcing function。

  注意：target id 放在外層 DIV（不是 LI 自己）——TreeWalker root 本身不觸發 acceptNode，
  id 若放 LI 上，walker 會從 LI 內部開始走，新加的 skip 規則永遠不會對 LI 本身評估。
-->

<!-- 正向 target：附件 LI，含 img 預覽 + file-content DIV
     注意：file-content 用 <span>（不是 <a>）裝檔名，才能隔離 v1.4.20 的新 skip。
     若是 <a class="file-name">，v1.4.17 的「block 含 CONTAINER 子 + 直屬 A」規則會
     先接走（skipBlockWithContainer 先命中），v1.4.20 的 mediaCardSkip 永遠不會 fire。
     真實 XenForo 兩種結構都存在；v1.4.17 涵蓋「A 檔名」子集，v1.4.20 補全「非 A 檔名」
     的缺口（以前會整個 LI 走 element unit → clean-slate 把預覽 img 清掉）。-->
<div id="target-attachment">
  <ul>
    <li class="attachment">
      <a class="file-preview" href="/download/preview.jpg"><img src="/preview.jpg" alt="preview"></a>
      <div class="file-content">
        <span class="file-name">interesting_project_brief.pdf</span>
        <div class="file-meta">2.3 MB · Uploaded 3 days ago by admin</div>
      </div>
    </li>
  </ul>
</div>

<!-- 負向對照 1：LI 含 img 但無 CONTAINER 子容器（純 inline run）
     例如一般文章段落的 inline 小圖示 + 文字，應該照原本路徑走（fragment / element），
     不該被新 skip 規則誤攔。-->
<div id="target-plain-li-with-img">
  <ul>
    <li>See our <img src="/icon.svg" alt="star"> featured article about product launches and the new roadmap.</li>
  </ul>
</div>

<!-- 負向對照 2：LI 含 CONTAINER 子容器但無媒體
     不該被新 skip 規則誤攔（本來就沒有 clean-slate 破壞媒體的疑慮）。-->
<div id="target-li-container-no-media">
  <ul>
    <li>
      <div>Inner block with enough translatable text content here to satisfy detection.</div>
    </li>
  </ul>
</div>

</body>
</html>
